name: ci

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    strategy:
        matrix:
            service: [api, worker, frontend]
    steps:
       - name: Checkout code
         uses: actions/checkout@v4

       - name: Set image name
         run: echo "IMAGE=ghcr.io/$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')/ticketing-${{ matrix.service }}" >> $GITHUB_ENV

       - name: Log into GCR
         uses: docker/login-action@v3
         with:
           registery: ghcr.io
           username: ${{ github.actor }}
           password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f ${{ matrix.service }}/Containerfile ${{ matrix.service }}/
  
      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '0'
          format: table

      - name: Push
        run: docker push --all-tags $IMAGE
