version: "3"
services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data

    redis:
      image: docker.io/library/redis:7

    api:
      image: localhost/ticketing-api:dev
      env_file: .env
      ports:
        - "8080:8080"
      depends_on:
         -  postgres
         -  redis

    worker:
      image: localhost/ticketing-worker:dev
      env_file: .env
      depends_on:
         - redis
         - postgres

    frontend:
      image: localhost/ticketing-frontend:dev
      env_file: .env
      ports:
          - "3000:3000"
      depends_on:
          - api

networks:
  default:
    external: true
    name: podman

volumes:
  postgres-data:
